<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══ Primary Meta ═══ -->
    <title>RÜNA ATLAS PRESS — Speculative Fiction from Marginalized Voices</title>
    <meta name="description" content="RÜNA ATLAS PRESS is an independent speculative fiction publisher centering voices from marginalized communities. Explore our catalog of science fiction, fantasy, horror, and magical realism across our Bohío Press and Void Noir imprints." />

    <meta name="author" content="RÜNA ATLAS PRESS" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://runaatlas.com/" />

    <!-- ═══ Open Graph / Facebook ═══ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RÜNA ATLAS PRESS" />
    <meta property="og:title" content="RÜNA ATLAS PRESS — Speculative Fiction from Marginalized Voices" />
    <meta property="og:description" content="An independent speculative fiction publisher centering voices from marginalized communities. Science fiction, fantasy, horror, and magical realism across our Bohío Press and Void Noir imprints." />

    <meta property="og:image" content="https://runaatlas.com/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RÜNA ATLAS PRESS — Speculative Fiction from Marginalized Voices" />
    <meta name="twitter:description" content="An independent speculative fiction publisher centering voices from marginalized communities. Science fiction, fantasy, horror, and magical realism." />
    <meta name="twitter:image" content="https://runaatlas.com/og-image.png" />

    <!-- ═══ Favicon Suite ═══ -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ═══ Theme & PWA ═══ -->
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rüna Atlas" />

    <!-- ═══ Preconnect for Performance ═══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />

    <!-- ═══ Structured Data: Organization ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RÜNA ATLAS PRESS",
      "url": "https://runaatlas.com",
      "logo": "https://runaatlas.com/og-image.png",
      "description": "An independent speculative fiction publisher centering voices from marginalized communities.",
      "foundingDate": "2024",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "editorial",
        "url": "https://runaatlas.com/contact"
      },
      "publishingPrinciples": "https://runaatlas.com/submissions"
    }
    </script>

    <!-- ═══ Structured Data: WebSite with SearchAction ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RÜNA ATLAS PRESS",
      "url": "https://runaatlas.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://runaatlas.com/catalog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
