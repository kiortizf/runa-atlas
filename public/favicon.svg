<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8c547;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a853;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#14141f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)" />
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.3" />
  <!-- R monogram -->
  <text x="256" y="300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="260" font-weight="bold" fill="url(#glow)" letter-spacing="-10">R</text>
  <!-- Constellation dots -->
  <circle cx="380" cy="120" r="4" fill="#d4a853" opacity="0.8" />
  <circle cx="400" cy="160" r="3" fill="#d4a853" opacity="0.6" />
  <circle cx="360" cy="90" r="3" fill="#d4a853" opacity="0.5" />
  <circle cx="130" cy="380" r="4" fill="#d4a853" opacity="0.7" />
  <circle cx="110" cy="350" r="3" fill="#d4a853" opacity="0.5" />
  <!-- Constellation lines -->
  <line x1="360" y1="90" x2="380" y2="120" stroke="#d4a853" stroke-width="1" opacity="0.3" />
  <line x1="380" y1="120" x2="400" y2="160" stroke="#d4a853" stroke-width="1" opacity="0.3" />
  <line x1="110" y1="350" x2="130" y2="380" stroke="#d4a853" stroke-width="1" opacity="0.3" />
</svg>
